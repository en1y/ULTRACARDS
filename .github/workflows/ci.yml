name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: ultracards
          POSTGRES_USER: ultracards_user
          POSTGRES_PASSWORD: ultracards123
        options: >-
          --health-cmd "pg_isready -U ultracards_user -d ultracards"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "25"
          cache: maven
          cache-dependency-path: "**/pom.xml"
      - run: mvn --batch-mode verify
