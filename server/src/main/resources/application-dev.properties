spring.config.activate.on-profile=dev
spring.devtools.add-properties=true

# Local database
spring.datasource.url=jdbc:postgresql://localhost:5432/ultracards
spring.datasource.username=ultracards_user
spring.datasource.password=ultracards123
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# Development logging
logging.level.root=INFO
logging.level.com.ultracards=DEBUG
logging.level.org.springframework.web=DEBUG
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.orm.jdbc.bind=TRACE

# Local cookies
app.cookie-token.secure=false
app.cookie-token.domain=
