<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" th:with="theme=${theme} ? ${theme} : 'dark'" th:attr="data-theme=${theme}">
<head>
    <meta charset="UTF-8">
    <title>ULTRACARDS</title>
    
    <link rel="stylesheet" th:href="@{/css/theme.css}">
    <script th:src="@{/js/theme.js}" defer></script>
    <script th:src="@{/webjars/stomp-websocket/2.3.4/stomp.min.js}"></script>
        <link rel="stylesheet" th:href="@{/ui/lobbies.css}">
</head>
<body>
    <div th:replace="~{ui/fragments/header :: header}"></div>

    <main class="lobbies-page">
        <section class="lobbies-hero container">
            <div class="lobbies-hero-copy">
                <span class="chip">Game browser</span>
                <h1>Find an ULTRAlobby</h1>
            </div>
            <div class="lobbies-hero-stats card">
                <strong>Create lobby</strong>
                <p>Create a new lobby for a new ULTRAexperience</p>
                <div class="lobbies-hero-actions">
                    <button class="btn-accent" type="button" data-action="open-create-lobby">Create Lobby</button>
                </div>
            </div>
        </section>

        <section class="container lobbies-layout">
            <aside class="card lobbies-sidebar">
                <div class="lobbies-panel-head">
                    <div>
                        <p class="lobbies-eyebrow">Filters</p>
                        <h2>Filter the lobby list</h2>
                    </div>
                </div>

                <div class="lobbies-filter-group">
                    <label class="field" for="game-type">
                        <span>Game type</span>
                        <select id="game-type">
                            <option value="all">All games</option>
                            <option value="briskula">Briskula</option>
                            <option value="durak">Durak</option>
                            <option value="poker">Poker</option>
                            <option value="treseta">Treseta</option>
                        </select>
                    </label>
                </div>

                <div id="game-settings" class="lobbies-dynamic-settings" hidden="hidden"></div>

                <div class="lobbies-sidebar-actions">
                    <button class="btn-accent" type="button">Apply Filters</button>
                </div>
            </aside>

            <section class="lobbies-content">
                <div class="lobbies-list-head">
                    <div>
                        <p class="lobbies-eyebrow">Open rooms</p>
                        <h2>Available lobbies</h2>
                    </div>
                    <span id="active-lobbies-count" class="chip" th:text="${#lists.size(lobbies) + ' active'}">0 active</span>
                </div>

                <div class="lobbies-list">
                    <article id="lobbies-empty" class="card lobby-empty-state" th:if="${#lists.isEmpty(lobbies)}">
                        <h3>No active lobbies present</h3>
                        <p>
                            Create a room for yet another ULTRAgame
                        </p>
                        <div class="lobby-empty-actions">
                            <button class="btn-accent" type="button" data-action="open-create-lobby">Create Lobby</button>
                        </div>
                    </article>
                    <div id="lobbies-grid" class="lobbies-grid"></div>
                </div>
            </section>
        </section>
        <div id="create-div" class="modal-overlay">
            <div class="modal create-lobby-modal" role="dialog" aria-modal="true" aria-labelledby="create-lobby-title">
                <header>
                    <strong id="create-lobby-title">Create lobby</strong>
                    <button class="btn" data-close-create type="button" aria-label="Close">✕</button>
                </header>
                <div class="content">
                    <form id="create-lobby-form" class="create-lobby-form">
                        <div class="field">
                            <label for="create-lobby-name">Lobby name</label>
                            <input id="create-lobby-name" type="text" name="lobbyName" placeholder="ULTRA...?">
                        </div>

                        <div class="field">
                            <label for="create-game-type">Game type</label>
                            <select id="create-game-type">
                                <option value="all">Choose a game</option>
                                <option value="briskula">Briskula</option>
                                <option value="durak">Durak</option>
                                <option value="poker">Poker</option>
                                <option value="treseta">Treseta</option>
                            </select>
                        </div>

                        <div id="create-game-settings" class="lobbies-dynamic-settings" hidden="hidden"></div>
                    </form>
                </div>
                <div class="actions">
                    <button class="btn" type="button" data-close-create>Cancel</button>
                    <button id="create-lobby-submit" class="btn btn-accent" type="button">Create Lobby</button>
                </div>
            </div>
        </div>
    </main>

    <aside id="lobbies-toast" class="lobbies-toast" aria-live="polite" aria-atomic="true" hidden>
        <p id="lobbies-toast-title" class="lobbies-toast-title">Lobby unavailable</p>
        <p id="lobbies-toast-text" class="lobbies-toast-text">This lobby is already full.</p>
    </aside>

    <script th:src="@{/js/gameTypes.js}"></script>
    <script th:inline="javascript">
        window.__INITIAL_LOBBIES__ = /*[[${lobbies}]]*/ [];
    </script>
    <script th:src="@{/ui/lobbies.js}"></script>

    <div th:replace="~{ui/fragments/footer :: footer}"></div>
</body>
</html>
