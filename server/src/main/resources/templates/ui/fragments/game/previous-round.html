<th:block th:fragment="previousRound(gameId)" xmlns:th="http://www.thymeleaf.org">
    <button class="prev-round-button" id="prev-round-back" type="button"
            th:aria-label="#{gameHistory.previous}" th:title="#{gameHistory.previous}">
        <img class="uc-icon" data-icon="previous_round" th:src="@{/pics/light/previous_round.svg}" alt="" aria-hidden="true" />
    </button>
    <button class="prev-round-button" id="prev-round-forward" type="button"
            th:aria-label="#{gameHistory.next}" th:title="#{gameHistory.next}">
        <img class="uc-icon" data-icon="next_round" th:src="@{/pics/light/next_round.svg}" alt="" aria-hidden="true" />
    </button>
</th:block>
