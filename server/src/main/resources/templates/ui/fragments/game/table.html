<th:block th:fragment="table(idPrefix, dropZoneText, cardsLeft, featuredCard, featuredEnabled, trumpSide, discardedCard)" xmlns:th="http://www.thymeleaf.org">
    <div class="table-wrap"
         th:attr="data-zone-id=${idPrefix + 'table-stage'},data-zone-kind='stage'">
        <div class="table-surface"
             th:attr="data-zone-id=${idPrefix + 'table'},data-zone-kind='table'">
            <div class="table-rim"></div>
            <div class="table-felt"></div>
            <div th:id="${idPrefix + 'player-ring'}" class="player-ring"></div>
            <div class="drop-zone"
                 th:id="${idPrefix + 'drop-zone'}"
                 th:attr="data-zone-id=${idPrefix + 'table-drop'},data-zone-kind='drop'"
                 th:text="${dropZoneText}">Drag a card to play</div>
            <div th:id="${idPrefix + 'table-turn-overlay'}" class="table-turn-overlay">
                <div th:id="${idPrefix + 'table-turn-message'}" class="table-turn-message" th:text="#{game.waitingNextMove}">Waiting for the next move</div>
            </div>
            <th:block th:replace="~{ui/fragments/game/teammate-hand :: teammateHand(null)}"></th:block>
            <div class="table-center">
                <div th:id="${idPrefix + 'trick-area'}"
                     class="trick-area"
                     th:attr="data-zone-id=${idPrefix + 'table-center'},data-zone-kind='center'"></div>
            </div>
            <div class="discarded-card-display" th:if="${discardedCard != null}" role="note" th:aria-label="#{game.discardedCard}">
                <th:block th:replace="~{ui/fragments/game/card :: card(${discardedCard}, ${discardedCard.cardType}, 'discarded-card', 0, ${idPrefix + 'discarded-card'})}"></th:block>
                <span class="discarded-card-label" th:text="#{game.discardedCard}">Card out of play</span>
            </div>
            <th:block th:replace="~{ui/fragments/game/deck :: deck(${idPrefix}, ${cardsLeft}, ${featuredCard}, ${featuredEnabled}, ${trumpSide})}"></th:block>
        </div>
    </div>
</th:block>
