<th:block th:fragment="card(card, cardType, cssClass, index, elementId)"
          th:with="resolvedCardType=${card != null and card.cardType != null ? card.cardType : (cardType != null ? cardType : 'ITALIAN')}"
          xmlns:th="http://www.thymeleaf.org">
    <div th:class="${(cssClass != null ? cssClass : 'game-card') + ' card-wrap'}"
         th:id="${elementId}"
         th:attr="data-card-type=${resolvedCardType},
                  data-card-code=${card != null ? card.card : null},
                  data-card-index=${index},
                  data-card-face=${card != null},
                  data-card-key=${card != null ? resolvedCardType + ':' + card.card : null}">
        <th:block th:if="${card != null}">
            <img class="card-front"
                 src=""
                 th:alt="${card != null ? #messages.msg('game.card.alt') : ''}">
        </th:block>
        <th:block th:unless="${card != null}">
            <img class="card-back"
                 th:src="${'/api/cards/' + #strings.toLowerCase(resolvedCardType) + '/back?v=2'}"
                 th:alt="#{game.cardBack.alt}">
        </th:block>
    </div>
</th:block>
