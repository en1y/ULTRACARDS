<th:block th:fragment="authModal" xmlns:th="http://www.thymeleaf.org">
  <div id="login-modal" class="modal-overlay">
    <div class="modal" role="dialog" aria-modal="true" aria-labelledby="login-title">
      <header>
        <div>
          <strong id="login-title" th:text="#{auth.title}">Welcome to ULTRACARDS</strong>
          <div id="login-subtitle" class="modal-subtitle" th:text="#{auth.subtitle}">Use your email to sign in or finish setting up your account.</div>
        </div>
        <button class="btn" data-close type="button" th:aria-label="#{common.close}">
          <img class="uc-icon" data-icon="close" th:src="@{/pics/light/close.svg}" alt="" aria-hidden="true" />
        </button>
      </header>
      <div class="content">
        <section data-step="email">
          <form id="email-step-form"
                th:action="@{/api/auth/email/send}"
                method="post">
            <div class="field">
              <label for="email-input" th:text="#{auth.email.label}">Email</label>
              <input id="email-input" name="email" type="email" th:placeholder="#{auth.email.placeholder}" placeholder="you@example.com" required />
              <small class="help" th:text="#{auth.email.help}">A 6‑digit code will be sent to your email.</small>
              <small id="email-error" class="error"></small>
            </div>
            <div class="actions">
              <button class="btn btn-accent" type="submit">
                <img class="uc-icon" data-icon="mail" th:src="@{/pics/light/mail.svg}" alt="" aria-hidden="true" />
                <span th:text="#{auth.sendCode}">Send Code</span>
              </button>
            </div>
          </form>
        </section>

        <section data-step="code" style="display:none">
          <form id="code-step-form">
            <div class="field">
              <label th:text="#{auth.code.label}">Enter 6‑digit code</label>
              <div class="code-inputs">
                <input class="code-box" inputmode="numeric" autocomplete="one-time-code" maxlength="1" />
                <input class="code-box" inputmode="numeric" maxlength="1" />
                <input class="code-box" inputmode="numeric" maxlength="1" />
                <input class="code-box" inputmode="numeric" maxlength="1" />
                <input class="code-box" inputmode="numeric" maxlength="1" />
                <input class="code-box" inputmode="numeric" maxlength="1" />
              </div>
              <small id="code-error" class="error"></small>
            </div>
            <div class="actions">
              <button class="btn" type="button" data-cancel th:text="#{common.cancel}">Cancel</button>
              <button class="btn" type="button" data-resend-code style="display:none" th:text="#{auth.resendCode}">Resend code</button>
              <button class="btn btn-accent" type="submit" th:text="#{auth.verify}">Verify</button>
            </div>
          </form>
        </section>

        <section data-step="username" style="display:none">
          <form id="username-step-form">
            <div class="field">
              <label for="username-input" th:text="#{auth.username.label}">Choose a username</label>
              <input id="username-input" type="text" th:placeholder="#{auth.username.placeholder}" placeholder="Your name" required />
              <small id="username-error" class="error"></small>
            </div>
            <div class="actions">
              <button class="btn" type="button" data-cancel th:text="#{common.cancel}">Cancel</button>
              <button class="btn btn-accent" type="submit" th:text="#{common.save}">Save</button>
            </div>
          </form>
        </section>
      </div>
    </div>
  </div>
</th:block>
