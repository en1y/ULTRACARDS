<th:block th:fragment="chatPanel(panelClass, headerClass, title, emptyText, chat, useUsername, username, currentUserId, idPrefix)"
          xmlns:th="http://www.thymeleaf.org">
    <aside th:class="${panelClass}">
        <div th:class="${headerClass}">
            <div>
                <span class="chip">Chat</span>
                <h2 th:text="${title}" th:attr="data-chat-title=${idPrefix}">Chat</h2>
            </div>
        </div>

        <div th:id="${idPrefix + '-messages'}" class="chat-messages">
            <div class="chat-message"
                 th:each="message : ${chat != null ? chat.messages : null}"
                 th:classappend="${
                    useUsername
                        ? (message.sender != null and message.sender.name == username ? ' is-own' : '')
                        : (message.sender != null and currentUserId != null and message.sender.id == currentUserId ? ' is-own' : '')
                 }">
                <div class="chat-meta">
                    <span th:text="${message.sender != null and message.sender.name != null ? message.sender.name : 'Player'}">Player</span>
                    <span th:if="${message.timestamp != null}"
                          class="chat-time"
                          th:attr="data-timestamp=${message.timestamp}"
                          th:text="${#temporals.format(message.timestamp, 'HH:mm')}">10:15</span>
                </div>
                <div class="chat-bubble" th:text="${message.message}">Hello</div>
            </div>
            <div class="chat-empty"
                 th:if="${chat == null or chat.messages == null or #lists.isEmpty(chat.messages)}"
                 th:text="${emptyText}">No messages yet.</div>
        </div>

        <form th:id="${idPrefix + '-form'}" class="chat-form">
            <textarea th:id="${idPrefix + '-input'}"
                      name="message"
                      rows="2"
                      maxlength="200"
                      placeholder="Send a message"
                      th:disabled="${chat == null or !chat.isOpen}"></textarea>
            <button th:id="${idPrefix + '-send'}" class="btn btn-accent" type="submit" th:disabled="${chat == null or !chat.isOpen}">
                <img class="uc-icon" data-icon="send" th:src="@{/pics/light/send.svg}" alt="" aria-hidden="true" />
                <span>Send</span>
            </button>
        </form>
    </aside>
</th:block>
