<!DOCTYPE html>
<html lang="en" th:lang="${lang}" xmlns:th="http://www.thymeleaf.org" th:with="theme=${theme} ? ${theme} : 'dark'" th:attr="data-theme=${theme}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title th:text="#{history.pageTitle}">Game History | ULTRACARDS</title>
    <script th:src="@{/js/theme-preload.js}"></script>
    <link rel="stylesheet" th:href="@{/css/theme.css}">
    <link rel="stylesheet" th:href="@{/css/ui/history.css}">
    <script th:src="@{/js/theme.js}" defer></script>
</head>
<body>
    <div th:replace="~{ui/fragments/header :: header}"></div>

    <main class="history-page">
        <section class="container history-shell">
            <aside class="card history-sidebar">
                <div>
                    <p class="history-eyebrow" th:text="#{common.filters}">Filters</p>
                    <h1 th:text="#{history.title}">Game history</h1>
                </div>

                <div class="history-filters">
                    <label class="field" for="history-game-type">
                        <span th:text="#{history.game}">Game</span>
                        <select id="history-game-type">
                            <option value="all" th:text="#{common.allGames}">All games</option>
                            <option value="briskula" th:text="#{game.briskula}">Briskula</option>
                        </select>
                    </label>

                    <label class="field" for="history-result">
                        <span th:text="#{history.result}">Result</span>
                        <select id="history-result">
                            <option value="both" th:text="#{history.winsAndLosses}">Wins and losses</option>
                            <option value="wins" th:text="#{history.wins}">Wins</option>
                            <option value="losses" th:text="#{history.losses}">Losses</option>
                        </select>
                    </label>

                    <label class="field" for="history-time-sort">
                        <span th:text="#{history.time}">Time</span>
                        <select id="history-time-sort">
                            <option value="latest" th:text="#{history.latestFirst}">Latest first</option>
                            <option value="oldest" th:text="#{history.oldestFirst}">Oldest first</option>
                        </select>
                    </label>
                </div>
            </aside>

            <section class="history-content">
                <div class="history-head">
                    <div>
                        <p class="history-eyebrow" th:text="#{history.completed.eyebrow}">Completed games</p>
                        <h2 th:text="#{history.pastGames}">Past games</h2>
                        <p id="history-summary" th:text="#{history.summary.latest}">Showing latest games.</p>
                    </div>
                    <button id="history-refresh" class="btn" type="button">
                        <img class="uc-icon" data-icon="refresh" th:src="@{/pics/light/refresh.svg}" alt="" aria-hidden="true" />
                        <span th:text="#{common.refresh}">Refresh</span>
                    </button>
                </div>

                <div id="history-list" class="history-list" aria-live="polite"></div>

                <div class="history-actions">
                    <button id="history-load-more" class="btn" type="button" th:text="#{history.loadMore}">Load More</button>
                </div>
            </section>
        </section>
    </main>

    <script th:inline="javascript">
        window.__CURRENT_USER_ID__ = /*[[${currentUserId}]]*/ null;
        window.__INITIAL_HISTORY__ = /*[[${initialHistory}]]*/ [];
    </script>
    <script th:src="@{/js/ui/history.js}"></script>
    <div th:replace="~{ui/fragments/footer :: footer}"></div>
</body>
</html>
