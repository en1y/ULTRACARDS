<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" th:with="theme=${theme} ? ${theme} : 'dark'" th:attr="data-theme=${theme}">
<head>
    <meta charset="UTF-8">
    <title>Game History | ULTRACARDS</title>
    <script th:src="@{/js/theme-preload.js}"></script>
    <link rel="stylesheet" th:href="@{/css/theme.css}">
    <link rel="stylesheet" th:href="@{/css/ui/history.css}">
    <script th:src="@{/js/theme.js}" defer></script>
</head>
<body>
    <div th:replace="~{ui/fragments/header :: header}"></div>

    <main class="history-page">
        <section class="container history-shell">
            <aside class="card history-sidebar">
                <div>
                    <p class="history-eyebrow">Filters</p>
                    <h1>Game history</h1>
                </div>

                <div class="history-filters">
                    <label class="field" for="history-game-type">
                        <span>Game</span>
                        <select id="history-game-type">
                            <option value="all">All games</option>
                            <option value="briskula">Briskula</option>
                        </select>
                    </label>

                    <label class="field" for="history-result">
                        <span>Result</span>
                        <select id="history-result">
                            <option value="both">Wins and losses</option>
                            <option value="wins">Wins</option>
                            <option value="losses">Losses</option>
                        </select>
                    </label>

                    <label class="field" for="history-time-sort">
                        <span>Time</span>
                        <select id="history-time-sort">
                            <option value="latest">Latest first</option>
                            <option value="oldest">Oldest first</option>
                        </select>
                    </label>
                </div>
            </aside>

            <section class="history-content">
                <div class="history-head">
                    <div>
                        <p class="history-eyebrow">Completed games</p>
                        <h2>Past games</h2>
                        <p id="history-summary">Showing latest games.</p>
                    </div>
                    <button id="history-refresh" class="btn" type="button">
                        <img class="uc-icon" data-icon="refresh" th:src="@{/pics/light/refresh.svg}" alt="" aria-hidden="true" />
                        <span>Refresh</span>
                    </button>
                </div>

                <div id="history-list" class="history-list" aria-live="polite"></div>

                <div class="history-actions">
                    <button id="history-load-more" class="btn" type="button">Load More</button>
                </div>
            </section>
        </section>
    </main>

    <script th:inline="javascript">
        window.__CURRENT_USER_ID__ = /*[[${currentUserId}]]*/ null;
        window.__INITIAL_HISTORY__ = /*[[${initialHistory}]]*/ [];
    </script>
    <script th:src="@{/js/ui/history.js}"></script>
    <div th:replace="~{ui/fragments/footer :: footer}"></div>
</body>
</html>
