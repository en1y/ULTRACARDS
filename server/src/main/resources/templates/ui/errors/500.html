<!DOCTYPE html>
<html lang="en" th:lang="${lang}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>ULTRACARDS - 500</title>

    <script th:src="@{/js/theme-preload.js}"></script>
    <link rel="stylesheet" th:href="@{/css/theme.css}">
    <script th:src="@{/js/theme.js}" defer></script>
</head>
<body>
<div th:replace="~{ui/fragments/header :: header}"></div>
<section class="hero container">
    <h2 th:text="#{error.heading('500')}">Error 500</h2>
    <h3 th:text="#{error.500.message}">Something broke on our side. Try again in a moment.</h3>
    <p>
        <a th:href="@{/}" class="btn btn-accent" th:text="#{error.goHome}">Go to home</a>
    </p>
</section>
<div th:replace="~{ui/fragments/footer :: footer}"></div>
</body>
</html>
