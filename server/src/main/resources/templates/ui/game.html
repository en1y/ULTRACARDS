<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" th:with="theme=${theme} ? ${theme} : 'dark'"
      th:attr="data-theme=${theme}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>ULTRACARDS</title>

    <script th:src="@{/js/theme-preload.js}"></script>
    <link rel="stylesheet" th:href="@{/css/theme.css}">
    <script th:src="@{/js/theme.js}" defer></script>
    <!--suppress CssUnusedSymbol -->
        <link rel="stylesheet" th:href="@{/css/ui/game.css}">
</head>
<body class="game-page">
<div th:replace="~{ui/fragments/header :: header}"></div>
<div id="connection-toast" class="connection-toast" role="status" aria-live="polite">Connection lost. Reconnecting…
</div>

<main class="container game-layout">
    <div id="game-container"
         th:attr="data-game-id=${game.id},data-current-user-id=${currentUserId},data-username=${username}">
        <div class="game-shell">
            <th:block th:replace="~{ui/fragments/game/table :: table('', 'Waiting for game', ${game != null ? game.cardsLeftInDeck : 0}, ${game != null ? game.trumpCard : null}, false, null)}"></th:block>
            <div class="hand-row">
                <th:block th:replace="~{ui/fragments/game/hand :: hand('', 'self', ${currentUserId}, null, 0)}"></th:block>
            </div>
        </div>
    </div>

    <th:block th:replace="~{ui/fragments/chat :: chatPanel('chat-sidebar', 'chat-header', 'Game yap', 'Why so scared to talk?', ${chat}, false, ${username}, ${currentUserId}, 'chat')}"></th:block>
</main>

<button id="mobile-chat-toggle" class="mobile-chat-toggle" type="button" aria-label="Open chat" data-chat-panel=".chat-sidebar">
    <img class="uc-icon" data-icon="chat" th:src="@{/pics/light/chat.svg}" alt="" aria-hidden="true" />
    <span class="mobile-chat-badge" hidden></span>
</button>
<script th:src="@{/js/ui/mobileChatDock.js}" defer></script>

<div th:replace="~{ui/fragments/footer :: footer}"></div>
<!--suppress JSUnresolvedVariable, RegExpRedundantEscape, CheckTagEmptyBody -->
<script th:inline="javascript">
    window.__INITIAL_GAME__ = /*[[${game}]]*/ null;
    window.__INITIAL_GAME_CHAT__ = /*[[${chat}]]*/ null;
</script>
<script th:src="@{/webjars/animejs/4.1.2/lib/anime.umd.min.js}"></script>
<script th:src="@{/webjars/interactjs/1.10.27/dist/interact.min.js}"></script>
<script th:src="@{/js/ui/game.js}"></script>
</body>
</html>
