<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" th:with="theme=${theme} ? ${theme} : 'dark'"
      th:attr="data-theme=${theme}">
<head>
    <meta charset="UTF-8">
    <title>ULTRACARDS</title>

    <script th:src="@{/js/theme-preload.js}"></script>
    <link rel="stylesheet" th:href="@{/css/theme.css}">
    <script th:src="@{/js/theme.js}" defer></script>
    <script th:src="@{/webjars/stomp-websocket/2.3.4/stomp.min.js}"></script>
    <!--suppress CssUnusedSymbol -->
        <link rel="stylesheet" th:href="@{/css/ui/game.css}">
</head>
<body>
<div th:replace="~{ui/fragments/header :: header}"></div>
<div id="connection-toast" class="connection-toast" role="status" aria-live="polite">Connection lost. Reconnecting...</div>
<div id="game-status-toast" class="game-status-toast" role="status" aria-live="polite" hidden>
    <p id="game-status-toast-title" class="game-status-toast-title">Game update</p>
    <p id="game-status-toast-text" class="game-status-toast-text">Unable to update the game.</p>
</div>

<main class="container game-layout">
    <div id="game-container"
         th:attr="data-game-id=${game.id},data-current-user-id=${currentUserId},data-username=${username}">
        <div class="briskula-shell">
            <div id="player-ring" class="player-ring opponents-row"></div>

            <div class="table-surface">
                <div class="table-play-row">
                    <section class="played-panel" aria-label="Played cards">
                        <div class="drop-zone" id="drop-zone">Drag a card to play</div>
                        <div id="trick-area" class="trick-area"></div>
                    </section>
                    <section class="deck-panel" aria-label="Deck">
                        <div class="deck-stack" id="deck-stack">
                        <div class="deck-cluster">
                            <div class="deck-tower" id="deck-tower"></div>
                            <img id="trump-card" class="trump-card" alt="Trump card">
                        </div>
                        <div class="deck-count">Deck: <span id="deck-left" th:text="${game.cardsLeftInDeck}">0</span>
                        </div>
                    </div>
                    </section>
                </div>
            </div>

            <div class="player-control-row">
                <div class="hand-stack">
                    <div id="table-turn-overlay" class="table-turn-overlay">
                        <div id="table-turn-message" class="table-turn-message">Waiting for the next move</div>
                    </div>
                    <div class="hand-zone">
                    <div id="hand-cards" class="hand-cards"></div>
                    </div>
                </div>
                <div id="self-seat-row" class="self-seat-row"></div>
            </div>
        </div>
    </div>

    <th:block th:replace="~{ui/fragments/chat :: chatPanel('chat-sidebar', 'chat-header', 'Game yap', 'Why so scared to talk?', ${chat}, false, ${username}, ${currentUserId})}"></th:block>
</main>

<div th:replace="~{ui/fragments/footer :: footer}"></div>
<!--suppress JSUnresolvedVariable, RegExpRedundantEscape, CheckTagEmptyBody -->
<script th:src="@{/js/chat.js}"></script>
<script th:inline="javascript">
    window.__INITIAL_GAME__ = /*[[${game}]]*/ null;
    window.__INITIAL_HAND__ = /*[[${initialHand}]]*/ null;
    window.__INITIAL_GAME_CHAT__ = /*[[${chat}]]*/ null;
</script>
<script th:src="@{/js/ui/game.js}"></script>
</body>
</html>
