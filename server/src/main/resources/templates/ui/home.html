<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" th:with="theme=${theme} ?: 'light'" th:attr="data-theme=${theme}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>ULTRACARDS</title>
    <script>
        (() => {
            const storageKey = 'uc-theme';
            const savedTheme = localStorage.getItem(storageKey);
            const systemDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
            const theme = savedTheme || (systemDark ? 'dark' : 'light');
            document.documentElement.setAttribute('data-theme', theme);
        })();
    </script>
    <link rel="stylesheet" th:href="@{/css/theme.css}">
    <script th:src="@{/js/theme.js}" defer></script>
</head>
<body>
<div th:replace="~{ui/fragments/header :: header}"></div>

<main>
    <section class="hero container">
        <h1>ULTRACARDS</h1>
        <p th:if="${isAuthenticated}">
            Welcome back bludisife
        </p>
        <p th:unless="${isAuthenticated}">
            Welcome to ULTRACARDS!
        </p>
    </section>
</main>

<div th:replace="~{ui/fragments/footer :: footer}"></div>
</body>
</html>
