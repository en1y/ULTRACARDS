<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" th:with="theme=${theme} ? ${theme} : 'dark'" th:attr="data-theme=${theme}">
<head>
    <meta charset="UTF-8">
    <title>ULTRACARDS</title>
    
    <link rel="stylesheet" th:href="@{/css/theme.css}">
    <script th:src="@{/js/theme.js}" defer></script>
    <script th:src="@{/webjars/stomp-websocket/2.3.4/stomp.min.js}"></script>
        <link rel="stylesheet" th:href="@{/ui/lobby.css}">
</head>
<body>
<div th:replace="~{ui/fragments/header :: header}"></div>

<main class="container lobby-page"
      id="lobby-page"
      th:attr="data-lobby-id=${lobby.id},data-username=${username}">
    <section class="lobby-layout">
        <article class="card lobby-panel">
            <div class="lobby-title-row">
                <div>
                    <span class="chip" id="lobby-type-chip" th:text="${lobby.gameType}">Briskula</span>
                    <h1 id="lobby-name" th:text="${lobby.name}">ULTRAlobby</h1>
                </div>
                <span class="chip" id="lobby-player-chip"
                      th:text="${#sets.size(lobby.players) + ' / ' + lobby.maxPlayers + ' players'}">1 / 2 players</span>
            </div>

            <div class="lobby-meta">
                <div class="lobby-meta-row">
                    <div>
                        <div class="lobby-meta-label">Host</div>
                        <div id="lobby-host" class="lobby-meta-value" th:text="${lobby.host.name}">Host</div>
                    </div>
                    <span class="chip">Owner</span>
                </div>
                <div class="lobby-meta-row">
                    <div>
                        <div class="lobby-meta-label">Configuration</div>
                        <div id="lobby-config" class="lobby-meta-value"
                             th:text="${lobby.gameType.name() == 'Briskula' and lobby.gameConfig != null
                                ? lobby.gameConfig.numberOfPlayers + ' players • ' + lobby.gameConfig.cardsInHandNum + ' cards each' + (lobby.gameConfig.numberOfPlayers == 4 ? (lobby.gameConfig.teamsEnabled ? ' • Teams enabled' : ' • No teams') : '')
                                : 'Standard rules'}">Loading…</div>
                        <div id="lobby-config-editor" class="lobby-config-editor field" hidden>
                            <label for="lobby-config-select">Change configuration</label>
                            <select id="lobby-config-select"></select>
                        </div>
                    </div>
                </div>
                <div class="lobby-meta-row">
                    <div>
                        <div class="lobby-meta-label">Connection status:</div>
                        <div id="ws-status" class="lobby-meta-value">Connecting…</div>
                    </div>
                </div>
            </div>

            <div id="lobby-status" class="lobby-status">Waiting for players…</div>

            <div class="lobby-actions">
                <button id="start-button" class="btn btn-accent" type="button">Start lobby</button>
                <button id="leave-button" class="btn" type="button">Leave lobby</button>
                <button id="delete-button" class="btn danger" type="button">Delete lobby</button>
            </div>
        </article>

        <div class="lobby-side-column">
            <aside class="card lobby-panel">
                <div class="lobby-title-row">
                    <div>
                        <span class="chip">Players</span>
                        <h2>Lobby members</h2>
                    </div>
                </div>
                <div id="players-list" class="players-list">
                    <div class="player-row" th:each="player : ${lobby.players}">
                        <div class="player-main">
                            <div class="player-avatar" th:text="${player.name != null and player.name.length() > 0 ? player.name.substring(0,1).toUpperCase() : 'U'}">U</div>
                            <div>
                                <div class="player-name" th:text="${player.name != null ? player.name : 'User ' + player.id}">Player</div>
                                <div class="player-role"
                                     th:text="${lobby.host != null and player.id == lobby.host.id ? 'Host' : (player.name == username ? 'You' : 'Player')}">Player</div>
                            </div>
                        </div>
                    </div>
                    <div class="lobby-empty" th:if="${#sets.isEmpty(lobby.players)}">No players in this lobby.</div>
                </div>
            </aside>

            <th:block th:replace="~{ui/fragments/chat :: chatPanel('card lobby-panel chat-panel', 'chat-header', 'Lobby chat', 'Too scared to send a message?', ${chat}, true, ${username}, null)}"></th:block>
        </div>
    </section>
    <aside id="lobby-toast" class="lobby-toast" aria-live="polite" aria-atomic="true" hidden>
    <p id="lobby-toast-title" class="lobby-toast-title">Lobby update</p>
    <p id="lobby-toast-text" class="lobby-toast-text">Configuration changed.</p>
    </aside>
</main>

<script th:src="@{/js/gameTypes.js}"></script>
<script th:src="@{/js/chat.js}"></script>
<script id="initial-lobby-data" type="application/json" th:inline="javascript">
    [[${lobby}]]
</script>
<script id="initial-lobby-chat-data" type="application/json" th:inline="javascript">
    [[${chat}]]
</script>
<script th:src="@{/ui/lobby.js}"></script>

<div th:replace="~{ui/fragments/footer :: footer}"></div>
</body>
</html>
